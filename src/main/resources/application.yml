spring:
  application:
    name: skku-navigation-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/skku_nav
    username: skku
    password: skku1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway가 스키마 관리 — JPA는 검증만
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.skku.nav: DEBUG
    org.springframework.web: INFO
