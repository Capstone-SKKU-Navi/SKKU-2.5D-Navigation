spring:
  application:
    name: skku-navigation-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/skku_nav
    username: skku
    password: skku1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway가 스키마 관리 — JPA는 검증만
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

cors:
  # 쉼표로 구분. 환경변수 CORS_ALLOWED_ORIGINS 로 런타임 오버라이드 가능.
  # 예) CORS_ALLOWED_ORIGINS=https://my-prod-url.vercel.app
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8082,http://localhost:3000}

logging:
  level:
    com.skku.nav: DEBUG
    org.springframework.web: INFO
